<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Terminal bracket left -->
  <text x="108" y="310" font-family="monospace" font-size="220" font-weight="bold" fill="url(#accent)" opacity="0.35">&gt;</text>

  <!-- Slash cursor -->
  <rect x="225" y="260" width="8" height="140" rx="4" fill="url(#warm)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Text "CA" -->
  <text x="256" y="355" font-family="monospace" font-size="160" font-weight="bold" fill="url(#accent)">CA</text>

  <!-- Bottom code line decoration -->
  <rect x="120" y="400" width="80" height="6" rx="3" fill="url(#accent)" opacity="0.4"/>
  <rect x="210" y="400" width="120" height="6" rx="3" fill="url(#accent)" opacity="0.25"/>
  <rect x="340" y="400" width="50" height="6" rx="3" fill="url(#accent)" opacity="0.15"/>

  <!-- Top code line decoration -->
  <rect x="120" y="130" width="60" height="6" rx="3" fill="url(#accent)" opacity="0.2"/>
  <rect x="190" y="130" width="90" height="6" rx="3" fill="url(#accent)" opacity="0.35"/>
</svg>
